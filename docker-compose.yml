version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: productivity
      POSTGRES_USER: productivity
      POSTGRES_PASSWORD: productivity
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  nextcloud:
    image: nextcloud:30-apache
    ports:
      - "8089:80"
    environment:
      POSTGRES_DB: productivity
      POSTGRES_USER: productivity
      POSTGRES_PASSWORD: productivity
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
      - onlyoffice
    volumes:
      - nextcloud_data:/var/www/html

  onlyoffice:
    image: onlyoffice/documentserver:latest
    ports:
      - "8085:80"
    environment:
      JWT_ENABLED: "false"

volumes:
  pg_data:
  nextcloud_data:
